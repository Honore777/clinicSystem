{# Flash messages partial: include this in base.html where you want flashes displayed #}
{% if get_flashed_messages() %}
  <div class="mb-4">
    {% for msg in get_flashed_messages() %}
      <div class="p-3 mb-2 rounded bg-amber-100 text-amber-800">{{ msg }}</div>
    {% endfor %}
  </div>
{% endif %}
