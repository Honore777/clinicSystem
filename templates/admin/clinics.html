{% extends 'base.html' %}
{% block content %}
  <h1 class="text-2xl font-bold mb-4">Clinics</h1>
  <table class="w-full bg-white rounded shadow">
    <thead>
      <tr class="text-left">
        <th class="p-2">ID</th>
        <th class="p-2">Name</th>
        <th class="p-2">City</th>
        <th class="p-2">Verified</th>
        <th class="p-2">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for c in clinics %}
        <tr>
          <td class="p-2">{{ c.id }}</td>
          <td class="p-2">{{ c.name }}</td>
          <td class="p-2">{{ c.city_name or '—' }}</td>
          <td class="p-2">{{ 'yes' if c.is_verified else 'no' }}</td>
          <td class="p-2">
            {% if not c.is_verified %}
              <form method="post" action="{{ url_for('admin.verify_clinic', clinic_id=c.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="bg-sky-600 text-white px-3 py-1 rounded hover:bg-sky-700">Verify</button>
              </form>
            {% endif %}
          </td>
        </tr>
      {% else %}
        <tr><td colspan="5" class="p-2">No clinics</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
