{% extends 'base.html' %}
{% block content %}
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Cancel Appointment Request #{{ request.id }}</h1>
    <a href="{{ url_for('patient.dashboard') }}" class="text-sm text-slate-600 hover:underline">Back to dashboard</a>
  </div>

  <div class="bg-white p-6 rounded-xl shadow max-w-2xl">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-sm text-slate-700">Cancellation message (required)</label>
        <textarea name="message" rows="4" class="w-full border p-2 rounded" required></textarea>
      </div>

      <div class="flex gap-2">
        <button class="px-4 py-2 bg-red-600 text-white rounded">Cancel Appointment</button>
        <a href="{{ url_for('patient.dashboard') }}" class="px-4 py-2 bg-slate-100 rounded">Back</a>
      </div>
    </form>
  </div>
{% endblock %}
