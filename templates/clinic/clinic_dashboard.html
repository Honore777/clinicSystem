{% extends 'base.html' %}
{% block content %}
  <h1 class="text-2xl font-bold mb-4">Clinic Dashboard - Pending Requests</h1>
  <div class="space-y-4">
    {% for r in requests %}
      <div class="bg-white p-4 rounded shadow">
        <div class="flex justify-between">
          <div>
            <div class="font-semibold">Request #{{ r.id }} — {{ r.patient_name }}</div>
            <div class="text-sm text-gray-600">{{ r.requested_start }} to {{ r.requested_end }}</div>
          </div>
          <div class="space-x-2">
            <form method="post" action="/clinic/request/{{ r.id }}/approve" hx-post="/clinic/request/{{ r.id }}/approve" hx-swap="outerHTML">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button class="bg-green-600 text-white px-3 py-1 rounded">Approve</button>
            </form>
          </div>
        </div>
      </div>
    {% else %}
      <div>No pending requests.</div>
    {% endfor %}
  </div>
{% endblock %}
